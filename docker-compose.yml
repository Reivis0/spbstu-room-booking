services:
  postgres:
    build:
      context: ./infrastructure/postgreSQL
      dockerfile: Dockerfile
    container_name: booking-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_logs:/var/log/postgresql/pg_log
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - booking-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    build:
      context: ./infrastructure/redis
      dockerfile: Dockerfile
    container_name: booking-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - booking-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nats:
    build:
      context: ./infrastructure/nats
      dockerfile: Dockerfile
    container_name: booking-nats
    ports:
      - "127.0.0.1:${NATS_CLIENT_PORT}:4222"
      - "127.0.0.1:${NATS_HTTP_PORT}:8222"
      - "127.0.0.1:${NATS_CLUSTER_PORT}:6222"
    volumes:
      - nats_data:/data
    # Cache for BuildKit
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - booking-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/varz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    stop_signal: SIGTERM
    stop_grace_period: 180s

  booking_api:
    build:
      context: ./booking_API
      dockerfile: Dockerfile
    container_name: booking-api
    # Persist Maven cache between builds
    volumes:
      - maven_cache:/root/.m2
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?stringtype=unspecified
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_APP_USER: ${POSTGRES_USER}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
      AVAILABILITY_ENGINE_HOST: ${AVAILABILITY_ENGINE_HOST}
      AVAILABILITY_ENGINE_PORT: ${AVAILABILITY_ENGINE_PORT}
      TZ: ${TZ}
      JAVA_TOOL_OPTIONS: "-Xmx512m -XX:+UseG1GC"
      SPRING_FLYWAY_ENABLED: "false"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - booking-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  availabilityengine:
    build:
      context: ./availability_engine
      dockerfile: Dockerfile
    container_name: availability-engine
    volumes:
      - ccache_data:/root/.ccache
    ports:
      - "127.0.0.1:50051:50051"
      - "127.0.0.1:8082:8082"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NATS_HOST: nats
      NATS_PORT: 4222
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - booking-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50051"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s



  ruz-importer:
    build:
      context: ./availability_engine
      dockerfile: Dockerfile
    container_name: ruz-importer
    command: ["importer"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NATS_HOST: nats
      NATS_PORT: 4222
      RUZ_API_URL: https://ruz.spbstu.ru/api/v1/ruz
      RUZ_IMPORT_INTERVAL: 3600
      # Per-university concurrency limits
      SPBPU_MAX_THREADS: 10
      SPBGU_MAX_THREADS: 2
      LETI_MAX_THREADS: 5
      # Proactive rate limiting (delay before each request)
      RUZ_DELAY_MS: 300
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - booking-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "ruz_importer"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - booking-net
    restart: unless-stopped

  nats-exporter:
    image: natsio/prometheus-nats-exporter
    container_name: nats-exporter
    command: ["-varz", "http://nats:8222"]
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - booking-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api/v1
    container_name: booking-frontend
    volumes:
      - npm_cache:/root/.npm
    ports:
      - "3000:80"
    environment:
      - TZ=${TZ}
    networks:
      - booking-net
    depends_on:
      booking_api:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    image: flyway/flyway:10.10.0
    container_name: booking-migrate
    command:
      - -url=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - -user=${POSTGRES_USER}
      - -password=${POSTGRES_PASSWORD}
      - -locations=filesystem:/flyway/sql
      - -table=flyway_schema_history
      - -baselineOnMigrate=true
      - -validateOnMigrate=false
      - -ignoreMigrationPatterns=*:missing,*:future
      - migrate
    volumes:
      - ./infrastructure/postgreSQL/migrations:/flyway/sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - booking-net
    restart: on-failure

  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: booking-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    networks:
      - booking-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:10.4.1
    container_name: booking-grafana
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    networks:
      - booking-net
    restart: unless-stopped
    depends_on:
      - prometheus
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  postgres_logs:
    driver: local
  redis_data:
    driver: local
  nats_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local
  maven_cache:
    driver: local
  ccache_data:
    driver: local
  npm_cache:
    driver: local

networks:
  booking-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1


