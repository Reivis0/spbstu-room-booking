global:
  resolve_timeout: 5m
  slack_api_url: '${SLACK_WEBHOOK_URL}'
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

# Templates for formatting alerts
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route defines the structure of routing rules
route:
  # Root receiver (fallback)
  receiver: 'default'
  
  # Grouping configuration
  group_by: ['environment', 'service', 'severity', 'alertname']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h
  
  # Child routes with specific conditions
  routes:
    # Critical alerts → PagerDuty + Slack #incidents
    - matchers:
        - severity: 'critical'
      receiver: 'pagerduty-critical'
      group_wait: 0s
      group_interval: 1m
      repeat_interval: 4h
      continue: true
      routes:
        - matchers:
            - severity: 'critical'
            - service: 'database'
          receiver: 'slack-database'
          continue: true
        - matchers:
            - severity: 'critical'
            - service: 'infrastructure'
          receiver: 'slack-infrastructure'
          continue: true

    # Database-specific alerts → Slack #database-alerts
    - matchers:
        - service: 'database'
        - severity: 'warning|info'
      receiver: 'slack-database'
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 1h
      continue: false

    # Infrastructure-specific alerts → Slack #infrastructure-alerts
    - matchers:
        - service: 'infrastructure'
        - severity: 'warning|info'
      receiver: 'slack-infrastructure'
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 1h
      continue: false

    # Warning alerts → Slack #alerts channel
    - matchers:
        - severity: 'warning'
      receiver: 'slack-alerts'
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 1h
      continue: false

    # Info/Notice alerts → Slack #ops-info channel
    - matchers:
        - severity: 'info|notice'
      receiver: 'slack-info'
      group_wait: 30s
      group_interval: 10m
      repeat_interval: 24h
      continue: false


# Receivers define the notification endpoints
receivers:
  # Default fallback receiver (silent)
  - name: 'default'

  # PagerDuty receiver for critical incidents
  - name: 'pagerduty-critical'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_INTEGRATION_KEY}'
        description: '{{ .GroupLabels.alertname }}: {{ .Status }}'
        details:
          severity: '{{ .GroupLabels.severity }}'
          environment: '{{ .GroupLabels.environment }}'
          service: '{{ .GroupLabels.service }}'
          cluster: '{{ .GroupLabels.cluster }}'
        client: 'Alertmanager'
        client_url: '{{ .ExternalURL }}'

  # Slack receiver for critical incidents (#incidents)
  - name: 'slack-critical'
    slack_configs:
      - channel: '#incidents'
        api_url: '${SLACK_WEBHOOK_CRITICAL}'
        title: '🚨 CRITICAL ALERT: {{ .GroupLabels.alertname }}'
        text: |
          *Status:* {{ .Status | toUpper }}
          *Environment:* {{ .GroupLabels.environment }}
          *Service:* {{ .GroupLabels.service }}
          *Cluster:* {{ .GroupLabels.cluster }}
          {{ if .CommonAnnotations.description }}*Description:* {{ .CommonAnnotations.description }}{{ end }}
          {{ if .CommonAnnotations.runbook_url }}*Runbook:* {{ .CommonAnnotations.runbook_url }}{{ end }}
          {{ if .CommonAnnotations.dashboard_url }}*Dashboard:* {{ .CommonAnnotations.dashboard_url }}{{ end }}
          
          *Alerts ({{ .Alerts.Firing | len }})*:
          {{ range .Alerts.Firing -}}
          • {{ .Labels.alertname }}: {{ .Annotations.summary }}
          {{ end }}
        send_resolved: true
        title_link: '{{ .ExternalURL }}'
        color: 'danger'

  # Slack receiver for warning alerts (#alerts)
  - name: 'slack-alerts'
    slack_configs:
      - channel: '#alerts'
        api_url: '${SLACK_WEBHOOK_ALERTS}'
        title: '⚠️  WARNING: {{ .GroupLabels.alertname }}'
        text: |
          *Status:* {{ .Status | toUpper }}
          *Environment:* {{ .GroupLabels.environment }}
          *Service:* {{ .GroupLabels.service }}
          *Severity:* {{ .GroupLabels.severity }}
          {{ if .CommonAnnotations.description }}*Description:* {{ .CommonAnnotations.description }}{{ end }}
          {{ if .CommonAnnotations.runbook_url }}*Runbook:* {{ .CommonAnnotations.runbook_url }}{{ end }}
          {{ if .CommonAnnotations.dashboard_url }}*Dashboard:* {{ .CommonAnnotations.dashboard_url }}{{ end }}
          
          *Alerts ({{ .Alerts.Firing | len }})*:
          {{ range .Alerts.Firing -}}
          • {{ .Labels.alertname }}: {{ .Annotations.summary }}
          {{ end }}
        send_resolved: true
        title_link: '{{ .ExternalURL }}'
        color: 'warning'

  # Slack receiver for database alerts (#database-alerts)
  - name: 'slack-database'
    slack_configs:
      - channel: '#database-alerts'
        api_url: '${SLACK_WEBHOOK_DATABASE}'
        title: '🗄️  DATABASE: {{ .GroupLabels.alertname }}'
        text: |
          *Status:* {{ .Status | toUpper }}
          *Environment:* {{ .GroupLabels.environment }}
          *Severity:* {{ .GroupLabels.severity }}
          *Instance:* {{ .GroupLabels.instance }}
          {{ if .CommonAnnotations.description }}*Description:* {{ .CommonAnnotations.description }}{{ end }}
          {{ if .CommonAnnotations.runbook_url }}*Runbook:* {{ .CommonAnnotations.runbook_url }}{{ end }}
          {{ if .CommonAnnotations.dashboard_url }}*Dashboard:* {{ .CommonAnnotations.dashboard_url }}{{ end }}
          
          *Alerts ({{ .Alerts.Firing | len }})*:
          {{ range .Alerts.Firing -}}
          • {{ .Labels.alertname }}: {{ .Annotations.summary }}
          {{ end }}
        send_resolved: true
        title_link: '{{ .ExternalURL }}'
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

  # Slack receiver for infrastructure alerts (#infrastructure-alerts)
  - name: 'slack-infrastructure'
    slack_configs:
      - channel: '#infrastructure-alerts'
        api_url: '${SLACK_WEBHOOK_INFRASTRUCTURE}'
        title: '🔧 INFRASTRUCTURE: {{ .GroupLabels.alertname }}'
        text: |
          *Status:* {{ .Status | toUpper }}
          *Environment:* {{ .GroupLabels.environment }}
          *Severity:* {{ .GroupLabels.severity }}
          *Node:* {{ .GroupLabels.node }}
          {{ if .CommonAnnotations.description }}*Description:* {{ .CommonAnnotations.description }}{{ end }}
          {{ if .CommonAnnotations.runbook_url }}*Runbook:* {{ .CommonAnnotations.runbook_url }}{{ end }}
          {{ if .CommonAnnotations.dashboard_url }}*Dashboard:* {{ .CommonAnnotations.dashboard_url }}{{ end }}
          
          *Alerts ({{ .Alerts.Firing | len }})*:
          {{ range .Alerts.Firing -}}
          • {{ .Labels.alertname }}: {{ .Annotations.summary }}
          {{ end }}
        send_resolved: true
        title_link: '{{ .ExternalURL }}'
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

  # Slack receiver for info/ops alerts (#ops-info)
  - name: 'slack-info'
    slack_configs:
      - channel: '#ops-info'
        api_url: '${SLACK_WEBHOOK_OPS_INFO}'
        title: 'ℹ️  INFO: {{ .GroupLabels.alertname }}'
        text: |
          *Status:* {{ .Status | toUpper }}
          *Environment:* {{ .GroupLabels.environment }}
          *Service:* {{ .GroupLabels.service }}
          {{ if .CommonAnnotations.description }}*Description:* {{ .CommonAnnotations.description }}{{ end }}
          {{ if .CommonAnnotations.runbook_url }}*Runbook:* {{ .CommonAnnotations.runbook_url }}{{ end }}
          
          *Alerts ({{ .Alerts.Firing | len }})*:
          {{ range .Alerts.Firing -}}
          • {{ .Labels.alertname }}: {{ .Annotations.summary }}
          {{ end }}
        send_resolved: true
        title_link: '{{ .ExternalURL }}'
        color: 'good'


# Inhibition rules suppress lower-priority alerts when higher-priority ones fire
inhibit_rules:
  # Suppress HighLatency when InstanceDown is active (same service/environment)
  - source_matchers:
      - alertname: 'InstanceDown'
      - severity: 'critical'
    target_matchers:
      - alertname: 'HighLatency'
      - severity: 'warning|info'
    equal: ['environment', 'service']

  # Suppress HighErrorRate when InstanceDown is active (same service/environment)
  - source_matchers:
      - alertname: 'InstanceDown'
      - severity: 'critical'
    target_matchers:
      - alertname: 'HighErrorRate'
      - severity: 'warning|info'
    equal: ['environment', 'service']

  # Suppress DiskSpaceRunningOut when InstanceDown is active (same node/environment)
  - source_matchers:
      - alertname: 'InstanceDown'
      - severity: 'critical'
    target_matchers:
      - alertname: 'DiskSpaceRunningOut'
      - severity: 'warning|info'
    equal: ['environment', 'instance']

  # Suppress low-severity alerts during high-severity incidents (same environment)
  - source_matchers:
      - severity: 'critical'
    target_matchers:
      - severity: 'warning'
    equal: ['environment']

  # Suppress info alerts when warnings or criticals are active (same service)
  - source_matchers:
      - severity: 'warning|critical'
    target_matchers:
      - severity: 'info'
    equal: ['service']

  # Suppress connection timeout alerts when instance is down
  - source_matchers:
      - alertname: 'InstanceDown'
    target_matchers:
      - alertname: 'ConnectionTimeout'
    equal: ['instance']

  # Suppress high memory usage when pod is restarting
  - source_matchers:
      - alertname: 'PodRestarting'
    target_matchers:
      - alertname: 'HighMemoryUsage'
    equal: ['pod', 'namespace']

  # Suppress network errors when node is unreachable
  - source_matchers:
      - alertname: 'NodeUnreachable'
    target_matchers:
      - alertname: 'NetworkErrors'
    equal: ['node']
