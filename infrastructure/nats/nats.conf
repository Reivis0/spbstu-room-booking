server_name: booking-nats
listen: 0.0.0.0:4222
http_port: 8222

max_connections: 1000
max_payload: 1048576
max_pending: 67108864

jetstream {
  store_dir: /data/jetstream
  max_mem_store: 512MB
  max_file_store: 1GB
}

# In Docker, NATS logs to stdout by default
logtime: true
debug: false
trace: false
