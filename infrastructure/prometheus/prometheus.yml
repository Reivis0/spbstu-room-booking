global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'booking-api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['booking-api:8081']

  - job_name: 'availability-engine'
    static_configs:
      - targets: ['availability-engine:8082']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'nats'
    static_configs:
      - targets: ['nats-exporter:9422']

  # Example of adding other services (if they expose metrics)
  # - job_name: 'frontend'
  #   static_configs:
  #     - targets: ['booking-frontend:80']
