global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'booking_api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['booking-api:8081']

  # Example of adding other services (if they expose metrics)
  # - job_name: 'frontend'
  #   static_configs:
  #     - targets: ['booking-frontend:80']
