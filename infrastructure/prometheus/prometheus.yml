# SPbSTU Room Booking System - Prometheus Configuration
# Production-grade configuration for comprehensive monitoring

global:
  # How often to evaluate rules
  evaluation_interval: 15s
  # How often to scrape targets by default
  scrape_interval: 30s
  # How long until a scrape request times out
  scrape_timeout: 10s
  # Global default for how long a metric is valid for before expiration
  external_labels:
    environment: production
    cluster: spbstu-booking

# Alertmanager configuration (if deployed)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files (for alert rules and recording rules)
rule_files:
  - '/etc/prometheus/recording_rules.yml'
  - '/etc/prometheus/alerting_rules.yml'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    honor_labels: true
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service_name: 'prometheus'
          instance_type: 'monitoring'

  # Java Booking API
  - job_name: 'java-api'
    honor_labels: true
    metrics_path: '/actuator/prometheus'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          service_name: 'booking-api'
          instance_type: 'application'

  # C++ Availability Engine (metrics on port 8082)
  - job_name: 'cpp-engine'
    honor_labels: true
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          service_name: 'availability-engine'
          instance_type: 'application'

  # PostgreSQL Exporter
  - job_name: 'postgres-exporter'
    honor_labels: true
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service_name: 'postgres'
          instance_type: 'database'

  # NATS Exporter
  - job_name: 'nats-exporter'
    honor_labels: true
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['nats-exporter:7777']
        labels:
          service_name: 'nats'
          instance_type: 'messaging'

  # Redis (if exporter is deployed)
  # Uncomment when redis-exporter is added to docker-compose
