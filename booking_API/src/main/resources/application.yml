spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migrations
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false
    table: flyway_schema_history
    placeholders:
      app_user: ${DB_APP_USER}
  redis:
    host: ${SPRING_REDIS_HOST}
    port: ${SPRING_REDIS_PORT}
    password: ${SPRING_REDIS_PASSWORD}
    timeout: 5000

server:
  port: 8081

app:
  jwt:
    secret: ${JWT_SECRET:supersecret}
    issuer: architecht-booking-api
    access-ttl-seconds: 3600

nats:
  url: ${NATS_URL}

availability-engine:
  host: ${AVAILABILITY_ENGINE_HOST}
  port: ${AVAILABILITY_ENGINE_PORT}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
