spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migrations
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false
    table: flyway_schema_history
    placeholders:
      app_user: ${DB_APP_USER}
  redis:
    host: ${SPRING_REDIS_HOST}
    port: ${SPRING_REDIS_PORT}
    password: ${SPRING_REDIS_PASSWORD}
    timeout: 5000

server:
  port: 8081

app:
  jwt:
    secret: ${JWT_SECRET:supersecret}
    issuer: architecht-booking-api
    access-ttl-seconds: 3600
  saga:
    max-active-bookings-per-user: ${SAGA_MAX_ACTIVE_BOOKINGS:5}
    max-retries: ${SAGA_MAX_RETRIES:5}
    retry-base-delay-ms: ${SAGA_RETRY_BASE_DELAY_MS:1000}
    processor:
      delay-ms: ${SAGA_PROCESSOR_DELAY_MS:2000}
      batch-size: ${SAGA_PROCESSOR_BATCH_SIZE:50}
  outbox:
    publisher:
      delay-ms: ${OUTBOX_PUBLISHER_DELAY_MS:1000}
    batch-size: ${OUTBOX_BATCH_SIZE:100}

nats:
  url: ${NATS_URL}

availability-engine:
  host: ${AVAILABILITY_ENGINE_HOST}
  port: ${AVAILABILITY_ENGINE_PORT}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
